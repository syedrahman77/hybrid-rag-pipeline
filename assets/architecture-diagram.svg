<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="#ffffff"/>

  <!-- Title -->
  <text x="50" y="50" font-size="26" font-weight="700" fill="#26215C">Internal Knowledge Assistant — RAG Architecture</text>
  <text x="50" y="76" font-size="14" fill="#5F5E5A">n8n orchestration · Supabase pgvector · hybrid search + Cohere rerank · incremental sync</text>

  <!-- ============ INGESTION SECTION ============ -->
  <rect x="40" y="100" width="800" height="760" rx="16" fill="#F7FAFF" stroke="#85B7EB" stroke-width="1"/>
  <text x="64" y="128" font-size="15" font-weight="700" fill="#0C447C">INGESTION</text>

  <!-- Sources -->
  <text x="64" y="158" font-size="12" font-weight="700" fill="#5F5E5A">SOURCES</text>

  <g>
    <rect x="64" y="170" width="220" height="58" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
    <text x="174" y="194" font-size="13.5" font-weight="700" fill="#0C447C" text-anchor="middle">Google Drive triggers</text>
    <text x="174" y="213" font-size="11.5" fill="#185FA5" text-anchor="middle">new · updated · deleted</text>
  </g>
  <g>
    <rect x="300" y="170" width="220" height="58" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
    <text x="410" y="194" font-size="13.5" font-weight="700" fill="#0C447C" text-anchor="middle">Web crawler</text>
    <text x="410" y="213" font-size="11.5" fill="#185FA5" text-anchor="middle">Firecrawl + LLM classify</text>
  </g>
  <g>
    <rect x="536" y="170" width="240" height="58" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
    <text x="656" y="194" font-size="13.5" font-weight="700" fill="#0C447C" text-anchor="middle">Direct upload</text>
    <text x="656" y="213" font-size="11.5" fill="#185FA5" text-anchor="middle">form trigger · webhook</text>
  </g>

  <!-- Format router -->
  <line x1="410" y1="228" x2="410" y2="258" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arr)"/>
  <g>
    <rect x="120" y="260" width="600" height="66" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
    <text x="420" y="284" font-size="13.5" font-weight="700" fill="#2C2C2A" text-anchor="middle">Format-aware router (Switch)</text>
    <text x="420" y="305" font-size="11.5" fill="#444441" text-anchor="middle">HTML · Google Docs · native PDF · scanned PDF → Mistral OCR · image → Gemini vision</text>
  </g>

  <!-- Normalize + hash -->
  <line x1="420" y1="326" x2="420" y2="356" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arr)"/>
  <g>
    <rect x="200" y="358" width="440" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
    <text x="420" y="388" font-size="13" font-weight="700" fill="#2C2C2A" text-anchor="middle">Normalize → content hash → Record Manager lookup</text>
  </g>

  <!-- Three-way change detection -->
  <line x1="420" y1="408" x2="420" y2="436" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arr)"/>
  <g>
    <rect x="80" y="438" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
    <text x="170" y="462" font-size="13" font-weight="700" fill="#085041" text-anchor="middle">New</text>
    <text x="170" y="481" font-size="11.5" fill="#0F6E56" text-anchor="middle">insert vectors</text>
  </g>
  <g>
    <rect x="290" y="438" width="220" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
    <text x="400" y="462" font-size="13" font-weight="700" fill="#633806" text-anchor="middle">Changed</text>
    <text x="400" y="481" font-size="11.5" fill="#854F0B" text-anchor="middle">delete old + re-embed</text>
  </g>
  <g>
    <rect x="540" y="438" width="180" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
    <text x="630" y="462" font-size="13" font-weight="700" fill="#2C2C2A" text-anchor="middle">Unchanged</text>
    <text x="630" y="481" font-size="11.5" fill="#444441" text-anchor="middle">skip</text>
  </g>

  <!-- Chunk + embed -->
  <line x1="170" y1="494" x2="170" y2="522" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="400" y1="494" x2="400" y2="522" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arr)"/>
  <g>
    <rect x="80" y="524" width="430" height="64" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
    <text x="295" y="548" font-size="13.5" font-weight="700" fill="#26215C" text-anchor="middle">Recursive splitting + LLM metadata</text>
    <text x="295" y="568" font-size="11.5" fill="#3C3489" text-anchor="middle">200-token overlap · category: HR / Finance / Operations / IT</text>
  </g>

  <line x1="295" y1="588" x2="295" y2="616" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arr)"/>
  <g>
    <rect x="80" y="618" width="430" height="58" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
    <text x="295" y="642" font-size="13.5" font-weight="700" fill="#26215C" text-anchor="middle">OpenAI embeddings (text-embedding-3-small)</text>
    <text x="295" y="661" font-size="11.5" fill="#3C3489" text-anchor="middle">1536-dim vectors</text>
  </g>

  <!-- Record manager store -->
  <g>
    <rect x="540" y="524" width="180" height="152" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
    <text x="630" y="592" font-size="13" font-weight="700" fill="#2C2C2A" text-anchor="middle">Record Manager</text>
    <text x="630" y="612" font-size="11.5" fill="#444441" text-anchor="middle">doc_id + hash</text>
    <text x="630" y="630" font-size="11.5" fill="#444441" text-anchor="middle">(change tracking)</text>
  </g>

  <!-- Processed move -->
  <line x1="295" y1="676" x2="295" y2="704" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arr)"/>
  <g>
    <rect x="80" y="706" width="430" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
    <text x="295" y="733" font-size="12.5" fill="#2C2C2A" text-anchor="middle">Move file to processed folder</text>
  </g>

  <!-- ============ SHARED STORE ============ -->
  <g>
    <rect x="880" y="380" width="200" height="200" rx="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
    <text x="980" y="412" font-size="14.5" font-weight="700" fill="#085041" text-anchor="middle">Supabase</text>
    <text x="980" y="432" font-size="12.5" fill="#0F6E56" text-anchor="middle">pgvector</text>
    <line x1="900" y1="446" x2="1060" y2="446" stroke="#5DCAA5" stroke-width="0.8"/>
    <text x="980" y="470" font-size="11.5" fill="#0F6E56" text-anchor="middle">documents (HNSW)</text>
    <text x="980" y="490" font-size="11.5" fill="#0F6E56" text-anchor="middle">+ full-text (GIN)</text>
    <text x="980" y="514" font-size="11.5" fill="#0F6E56" text-anchor="middle">hybrid_search()</text>
    <text x="980" y="534" font-size="11.5" fill="#0F6E56" text-anchor="middle">RRF fusion fn</text>
    <text x="980" y="558" font-size="11.5" fill="#0F6E56" text-anchor="middle">chat_logs</text>
  </g>

  <!-- ingestion -> store -->
  <path d="M510 647 C 700 647, 760 500, 878 490" fill="none" stroke="#0F6E56" stroke-width="1.8" marker-end="url(#arrTeal)"/>
  <text x="715" y="560" font-size="11" fill="#0F6E56" font-style="italic">upsert vectors</text>

  <!-- ============ RETRIEVAL SECTION ============ -->
  <rect x="880" y="100" width="480" height="250" rx="16" fill="#FBF4F0" stroke="#F0997B" stroke-width="1"/>
  <text x="904" y="128" font-size="15" font-weight="700" fill="#993C1D">RETRIEVAL</text>

  <g>
    <rect x="904" y="142" width="432" height="46" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
    <text x="1120" y="170" font-size="13" font-weight="700" fill="#712B13" text-anchor="middle">Chat trigger → Agent (GPT-4.1 + memory)</text>
  </g>
  <line x1="1120" y1="188" x2="1120" y2="208" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arr)"/>
  <g>
    <rect x="904" y="210" width="432" height="46" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
    <text x="1120" y="232" font-size="12.5" font-weight="700" fill="#712B13" text-anchor="middle">Embed query → hybrid search (top 20)</text>
    <text x="1120" y="249" font-size="11" fill="#993C1D" text-anchor="middle">semantic + full-text, metadata-filtered</text>
  </g>
  <line x1="1120" y1="256" x2="1120" y2="276" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arr)"/>
  <g>
    <rect x="904" y="278" width="432" height="46" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
    <text x="1120" y="300" font-size="12.5" font-weight="700" fill="#712B13" text-anchor="middle">Cohere Rerank v4 (top 5) → grounded answer</text>
    <text x="1120" y="317" font-size="11" fill="#993C1D" text-anchor="middle">strict JSON · confidence · needs_human</text>
  </g>

  <!-- retrieval <-> store -->
  <path d="M980 380 C 980 350, 1000 270, 1010 258" fill="none" stroke="#0F6E56" stroke-width="1.8" marker-end="url(#arrTeal)"/>
  <text x="912" y="368" font-size="11" fill="#0F6E56" font-style="italic">query</text>

  <!-- ============ SIDE EFFECTS ============ -->
  <rect x="880" y="620" width="480" height="160" rx="16" fill="#FAFAF7" stroke="#B4B2A9" stroke-width="1"/>
  <text x="904" y="648" font-size="15" font-weight="700" fill="#444441">OBSERVABILITY &amp; ESCALATION</text>
  <g>
    <rect x="904" y="662" width="210" height="100" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
    <text x="1009" y="700" font-size="13" font-weight="700" fill="#2C2C2A" text-anchor="middle">Chat logging</text>
    <text x="1009" y="722" font-size="11.5" fill="#444441" text-anchor="middle">every Q&amp;A + sources</text>
    <text x="1009" y="740" font-size="11.5" fill="#444441" text-anchor="middle">to Supabase</text>
  </g>
  <g>
    <rect x="1126" y="662" width="210" height="100" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.8"/>
    <text x="1231" y="700" font-size="13" font-weight="700" fill="#791F1F" text-anchor="middle">Email escalation</text>
    <text x="1231" y="722" font-size="11.5" fill="#A32D2D" text-anchor="middle">low-confidence →</text>
    <text x="1231" y="740" font-size="11.5" fill="#A32D2D" text-anchor="middle">human follow-up</text>
  </g>

  <!-- retrieval -> side effects -->
  <path d="M1009 324 C 1009 450, 1009 560, 1009 660" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <path d="M1231 324 C 1231 450, 1231 560, 1231 660" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr)"/>

  <!-- footer -->
  <text x="50" y="888" font-size="11.5" fill="#888780">93-node n8n workflow · domain-agnostic (swap source folder + category taxonomy to repurpose)</text>
</svg>
